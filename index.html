<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<title>Scull Metrics V4</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

<style>
:root{
  --green:#00ff88;
  --amber:#ffaa00;
  --red:#ff2244;
  --blue:#00aaff;
  --bg:#000;
}

body{
  margin:0;background:#000;color:#fff;
  font-family:Oswald,sans-serif;
}

.screen{display:flex;flex-direction:column;height:100vh}

.hdr{
  display:flex;justify-content:space-between;
  padding:10px;border-bottom:1px solid #111;
}

.timer{font-family:"Share Tech Mono";font-size:26px}

.grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:1px;background:#111;
}

.cell{
  background:#000;padding:10px;
}

.label{font-size:9px;color:#666;letter-spacing:.2em}
.value{font-family:"Share Tech Mono";font-size:42px}
.unit{font-size:9px;color:var(--blue)}

.ctrl{
  display:flex;gap:8px;padding:10px;
}

button{
  flex:1;padding:14px;
  border:none;font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
}

/* state styles */
.start{background:var(--green)}
.pause{background:var(--amber)}
.stop{background:var(--red)}
.resume{background:var(--blue)}

canvas{width:100%;height:70px;background:#050505}
</style>
</head>

<body>

<div class="screen">

  <div class="hdr">
    <div>SCULL V4</div>
    <div class="timer" id="timer">00:00</div>
  </div>

  <div class="grid">
    <div class="cell">
      <div class="label">PACE /500</div>
      <div class="value" id="pace">--:--</div>
      <div class="unit">min/500</div>
    </div>

    <div class="cell">
      <div class="label">RATE</div>
      <div class="value" id="rate">--</div>
      <div class="unit">spm</div>
    </div>

    <div class="cell">
      <div class="label">DIST</div>
      <div class="value" id="dist">0.00</div>
      <div class="unit">km</div>
    </div>

    <div class="cell">
      <div class="label">STROKE LEN</div>
      <div class="value" id="slen">--</div>
      <div class="unit">m/stroke</div>
    </div>
  </div>

  <canvas id="acc"></canvas>

  <div class="ctrl">
    <button id="mainBtn" class="start" onclick="mainAction()">START</button>
  </div>

</div>

<script>

/* =========================
STATE MACHINE (CORE V4)
========================= */
const STATE = {
  IDLE: "idle",
  ROWING: "rowing",
  PAUSED: "paused",
  STOPPED: "stopped"
};

let state = STATE.IDLE;

/* =========================
DATA
========================= */
let t = 0;
let dist = 0;
let lastPos = null;

let strokes = [];
let strokeState = false;
let strokeStart = null;

let accBuf = [];

let session = {
  start: 0,
  strokes: [],
  rawAcc: []
};

/* =========================
STATE ACTIONS
========================= */
function mainAction(){
  switch(state){

    case STATE.IDLE:
    case STATE.STOPPED:
      start();
      break;

    case STATE.ROWING:
      pause();
      break;

    case STATE.PAUSED:
      resume();
      break;
  }
}

function start(){
  state = STATE.ROWING;

  session = {
    start: Date.now(),
    strokes: [],
    rawAcc: []
  };

  setButton("pause", "PAUSE");

  navigator.geolocation.watchPosition(pos=>{
    const c=pos.coords;

    if(lastPos){
      const d=haversine(lastPos,{lat:c.latitude,lon:c.longitude});
      if(d>0 && d<25) dist+=d;
    }

    lastPos={lat:c.latitude,lon:c.longitude};
    document.getElementById("dist").innerText=(dist/1000).toFixed(2);

  },()=>{}, {enableHighAccuracy:true});
}

function pause(){
  state = STATE.PAUSED;
  setButton("resume","RESUME");
}

function resume(){
  state = STATE.ROWING;
  setButton("pause","PAUSE");
}

function stop(){
  state = STATE.STOPPED;
  setButton("start","RESTART");

  const blob = new Blob([JSON.stringify(session,null,2)],{
    type:"application/json"
  });

  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="scull_v4.json";
  a.click();
}

/* =========================
BUTTON STATE BINDING
========================= */
function setButton(type,text){
  const b=document.getElementById("mainBtn");

  b.className=type;

  if(type==="start") b.onclick=start;
  if(type==="pause") b.onclick=mainAction;
  if(type==="resume") b.onclick=mainAction;
}

/* =========================
TIMER
========================= */
setInterval(()=>{
  if(state!==STATE.ROWING) return;

  t++;
  document.getElementById("timer").innerText=
    String(Math.floor(t/60)).padStart(2,'0')+":"+
    String(t%60).padStart(2,'0');
},1000);

/* =========================
ACCEL / STROKES
========================= */
window.addEventListener("devicemotion",e=>{
  if(state!==STATE.ROWING) return;

  const x = e.acceleration?.x || 0;

  accBuf.push(x);
  if(accBuf.length>200) accBuf.shift();

  session.rawAcc.push({t:Date.now(),x});

  const TH=1.3;

  if(!strokeState && x>TH){
    strokeState=true;
    strokeStart={
      t:Date.now(),
      acc:[]
    };
  }

  if(strokeState){
    strokeStart.acc.push(x);

    if(x<0.4){
      strokeState=false;

      const peak=Math.max(...strokeStart.acc);

      const stroke={
        t:strokeStart.t,
        peak
      };

      strokes.push(stroke);
      session.strokes.push(stroke);
    }
  }

  draw(accBuf);
});

/* =========================
HELPERS
========================= */
function haversine(a,b){
  const R=6371000;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLon=(b.lon-a.lon)*Math.PI/180;

  const x=
    Math.sin(dLat/2)**2+
    Math.cos(a.lat*Math.PI/180)*
    Math.cos(b.lat*Math.PI/180)*
    Math.sin(dLon/2)**2;

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

/* =========================
GRAPH
========================= */
const c=document.getElementById("acc");
const ctx=c.getContext("2d");

function draw(buf){
  const w=c.width=c.offsetWidth;
  const h=c.height=c.offsetHeight;

  ctx.clearRect(0,0,w,h);

  ctx.beginPath();
  buf.slice(-120).forEach((v,i)=>{
    const x=i/120*w;
    const y=h/2-v*12;
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  });

  ctx.strokeStyle="#00ff88";
  ctx.stroke();
}

</script>

</body>
</html>
